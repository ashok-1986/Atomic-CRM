# Define the rate limiting zone globally
limit_req_zone $binary_remote_addr zone=twenty_limit:10m rate=100r/m;

server {
    listen 80;
    server_name ~^(?<tenant>.+)\.crm\.alchemetryx\.com$ crm.alchemetryx.com;

    # Basic Rate Limiting (Phase 3 PRD Requirement: 100 req/min)
    limit_req zone=twenty_limit burst=20 nodelay;

    location / {
        proxy_pass http://server:3000;
        
        # Essential WebSocket & HTTP/1.1 headers for Twenty
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Twenty CRM specific
        proxy_read_timeout 86400; # Prevent websocket timeouts
    }

    # Block access to raw storage endpoints if MinIO is exposed
    location ~ ^/storage/ {
        deny all;
        return 403;
    }
}
