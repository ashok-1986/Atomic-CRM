name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 🔨 Build & 📡 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SB_PUBLISHABLE_KEY: ${{ secrets.SB_PUBLISHABLE_KEY }}

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build production
        run: npm run build

      - name: 📡 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR || './public_html/' }}
          dangerous-clean-slate: false
          log-level: verbose

  deploy-supabase:
    name: 🗄️ Deploy Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: ⚙️ Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔗 Link Supabase project
        run: npx supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: 📡 Push database migrations
        run: npx supabase db push --include-all

      - name: 📡 Deploy edge functions
        run: npx supabase functions deploy
        continue-on-error: true
