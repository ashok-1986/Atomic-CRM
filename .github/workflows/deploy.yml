name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the deployment folder on the remote VPS
            cd /opt/twenty
            
            # Pull the latest Docker configurations and scripts from GitHub
            git pull origin main
            
            # Pull the newest Twenty CRM images
            docker compose pull
            
            # Start/Restart the containers in detached mode
            docker compose up -d
            
            # Clean up old dangling Docker images to save disk space
            docker image prune -f
